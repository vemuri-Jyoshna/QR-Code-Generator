<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Code Generator</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background: linear-gradient(to right, #ff0f7b, #f89b29);
}

h1{
  color:#fff;
  margin-bottom:20px;
}

.main{
  width:320px;
  background:#fff;
  padding:20px;
  border-radius:10px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  text-align:center;
}

.input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:2px solid #ccc;
  border-radius:5px;
  outline:none;
}

.input:focus{
  border-color:#f89b29;
}

.btn{
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#ff0f7b;
  color:#fff;
  border:none;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:#e6006f;
}

img{
  margin-top:15px;
  width:150px;
  height:150px;
}

#download{
  display:none;
  margin-top:10px;
  text-decoration:none;
  background:#07c160;
  color:#fff;
  padding:8px 15px;
  border-radius:5px;
}

#toast{
  position:absolute;
  bottom:0;
  background:#07c160;
  color:#fff;
  padding:10px 20px;
  border-radius:5px;
  opacity:0;
  transition:0.3s;
}

#toast.show{
  bottom:40px;
  opacity:1;
}
</style>

</head>

<body>

<h1>QR Code Generator</h1>

<div class="main">
  <input type="text" class="input" placeholder="Enter text or URL...">
  
  <button class="btn">Generate QR Code</button>
  
  <img src="" alt="QR Code" class="code" style="display:none;">
  
  <a id="download" download="qrcode.png">Download QR</a>
</div>

<div id="toast">QR Code Generated Successfully!</div>

<script>
const btn = document.querySelector('.btn');
const input = document.querySelector('.input');
const code = document.querySelector('.code');
const toast = document.querySelector('#toast');
const download = document.querySelector('#download');

btn.addEventListener('click', generate);

function generate() {
  const data = input.value.trim();

  if (data === "") {
    showToast("Please enter some text!");
    return;
  }

  const url = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${data}`;

  code.src = url;
  code.style.display = "block";

  download.href = url;
  download.style.display = "inline-block";

  showToast("QR Code Generated!");
}

function showToast(message) {
  toast.textContent = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}
</script>

</body>
</html>
